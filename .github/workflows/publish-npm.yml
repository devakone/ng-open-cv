name: Publish npm package

on:
  pull_request:
  workflow_dispatch:
  # A merge of the release PR into main triggers release-please and, when
  # release-please creates a new release, the publish job below.
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  validate-pr-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Upgrade npm
        run: npm install --global npm@11.5.1

      - name: Verify npm version
        run: npm --version

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build library
        run: npm run build-lib

      - name: Run tests
        run: npm test -- --watch=false --progress=false --browsers=ChromeHeadlessNoSandbox

      - name: Package library
        run: npm run package

  release-please-on-main:
    if: github.event_name == 'push'
    needs: validate-pr-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs['projects/ng-open-cv--release_created'] }}
      version: ${{ steps.release.outputs['projects/ng-open-cv--version'] }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release PR or tag
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-release:
    if: ${{ always() && needs.validate-pr-and-release.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.release-please-on-main.outputs.release_created == 'true') }}
    needs:
      - validate-pr-and-release
      - release-please-on-main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm

      - name: Upgrade npm
        run: npm install --global npm@11.5.1

      - name: Verify npm version
        run: npm --version

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build package
        run: npm run package

      - name: Publish to npm
        run: npm publish ./dist/ng-open-cv --provenance --access public
