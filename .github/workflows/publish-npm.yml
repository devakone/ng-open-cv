name: Publish npm package

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm
        run: npm install -g npm@11.5.1

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build-lib

      - name: Run tests
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: npm test -- --watch=false --progress=false --browsers=ChromeHeadlessNoSandbox

      - name: Package library
        run: npm run package

      - name: Inspect packed metadata
        run: |
          cd dist/ng-open-cv
          node -p "require('./package.json')"

      - name: Publish to npm
        working-directory: dist/ng-open-cv
        env:
          NPM_CONFIG_PROVENANCE: true
        run: npm publish --access public --provenance
